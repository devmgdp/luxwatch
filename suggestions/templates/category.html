<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Category}} - LuxWatch</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="stylesheet" href="/static/media_query.css" />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div id="preloader"><div class="loader-diamond"></div></div>
    <div id="magic-cursor"></div>
    <div class="cursor-follower"></div>

    <div class="main-content">
      <nav>
        <ul>
          <li>
            <strong style="color: var(--primary); font-size: 1.4rem"
              >💎 LuxWatch</strong
            >
          </li>
        </ul>
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/category/House">Itens para Casa</a></li>
          <li><a href="/category/Electronics">Eletrônicos</a></li>
          <li><a href="/category/Suplements">Suplementos</a></li>
        </ul>
      </nav>

      <header class="category-header reveal active">
        <div class="scan-line"></div>
        <h2 data-text="{{.Category}}">{{.Category}}</h2>

        <div class="status-container">
          <p class="typing-effect">
            STATUS: SCANNING_MARKET_PRICES_IN_REAL_TIME_v2.0...
          </p>
          <div
            style="
              width: 150px;
              height: 2px;
              background: var(--glass-border);
              position: relative;
              overflow: hidden;
            "
          >
            <div
              style="
                position: absolute;
                height: 100%;
                background: var(--primary);
                width: 50px;
                animation: loading-bar 2s infinite linear;
              "
            ></div>
          </div>
        </div>
      </header>

      <main class="deals-grid">
        {{range .Products}}
        <article class="deal-card reveal">
          <div class="img-container">
            <img
              src="{{.ImageURL}}"
              style="max-width: 100%; max-height: 100%; object-fit: contain"
            />
          </div>
          <div class="card-content">
            <div class="product-name-container">
              <div class="product-name">{{.Name}}</div>
            </div>
            <div class="price">R$ {{printf "%.2f" .Price}}</div>
            <div class="btn-group">
              <button class="btn-chart" onclick="openChart('{{.Name}}')">
                Histórico
              </button>
              <a href="{{.URL}}" target="_blank" class="btn-buy">Comprar</a>
            </div>
          </div>
        </article>
        {{else}}
        <p style="grid-column: 1/-1; text-align: center">
          Nenhum produto em órbita.
        </p>
        {{end}}
      </main>
    </div>

    <dialog id="modal-chart">
      <article>
        <header>
          <strong style="color: var(--primary); letter-spacing: 2px"
            >DADOS_FLUTUACAO_PRECO</strong
          >
          <button
            class="close-btn"
            onclick="document.getElementById('modal-chart').close()"
          >
            ×
          </button>
        </header>

        <div
          id="m-name"
          style="
            font-size: 0.85rem;
            margin-bottom: 20px;
            color: var(--text-muted);
            font-family: monospace;
          "
        ></div>

        <div class="chart-box">
          <canvas id="canvasChart"></canvas>
        </div>
      </article>
    </dialog>

    <script>
      // 1. REVELAÇÃO (REVEAL)
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry, index) => {
            if (entry.isIntersecting) {
              const delay = (index % 3) * 150;
              setTimeout(() => {
                entry.target.classList.add("active");
              }, delay);
            }
          });
        },
        { threshold: 0.1 },
      );

      document
        .querySelectorAll(".reveal")
        .forEach((el) => observer.observe(el));

      // 2. PRELOADER
      window.addEventListener("load", () => {
        const loader = document.getElementById("preloader");
        setTimeout(() => {
          loader.style.opacity = "0";
          setTimeout(() => (loader.style.display = "none"), 600);
        }, 800);
      });

      // 3. LÓGICA DO GRÁFICO
      let chartInstance = null;
      async function openChart(name) {
        const cleanName = name.trim();
        const safeName = encodeURIComponent(cleanName);
        const modal = document.getElementById("modal-chart");
        document.getElementById("m-name").innerText = cleanName;

        if (typeof modal.showModal === "function") {
          modal.showModal();
        } else {
          modal.open = true;
        }

        try {
          const res = await fetch(`/api/history/${safeName}`);
          if (!res.ok) throw new Error("Erro na requisição");
          const data = await res.json();
          if (!data || data.length === 0) return;

          const ctx = document.getElementById("canvasChart").getContext("2d");
          if (chartInstance) chartInstance.destroy();

          chartInstance = new Chart(ctx, {
            type: "line",
            data: {
              labels: data.map((d) => {
                const date = new Date(d.date);
                return `${date.getDate()}/${date.getMonth() + 1}`;
              }),
              datasets: [
                {
                  label: "Preço (R$)",
                  data: data.map((d) => d.price),
                  borderColor: "#00a8ff",
                  backgroundColor: "rgba(0, 168, 255, 0.2)",
                  fill: true,
                  tension: 0.4,
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              scales: {
                y: {
                  grid: { color: "rgba(255, 255, 255, 0.1)" },
                  ticks: { color: "#00a8ff" },
                },
                x: { grid: { display: false }, ticks: { color: "#888" } },
              },
              plugins: { legend: { labels: { color: "#fff" } } },
            },

            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: {
                  display: window.innerWidth > 600, // Esconde legenda em telas muito pequenas
                  labels: { color: "#fff" },
                },
              },
              scales: {
                y: {
                  ticks: {
                    font: { size: 10 }, // Fonte menor no eixo Y para mobile
                  },
                },
              },
            },
          });
        } catch (err) {
          console.error(err);
        }
      }

      // 4. CURSOR MÁGICO (TAMANHO FIXO)
      const cursor = document.getElementById("magic-cursor");
      const follower = document.querySelector(".cursor-follower");

      document.addEventListener("mousemove", (e) => {
        const x = e.clientX;
        const y = e.clientY;

        // Mantemos a escala sempre em 1 para não crescer
        cursor.style.transform = `translate3d(${x - 10}px, ${y - 10}px, 0) scale(1)`;

        setTimeout(() => {
          follower.style.transform = `translate3d(${x - 20}px, ${y - 20}px, 0) scale(1)`;
        }, 50);
      });

      // Mantemos apenas a troca de cor para dar o feedback visual de clique
      const clickables = document.querySelectorAll(
        "a, button, .deal-card, .close-btn",
      );
      clickables.forEach((item) => {
        item.addEventListener("mouseenter", () => {
          cursor.style.background = "var(--accent)";
          follower.style.borderColor = "var(--accent)";
        });
        item.addEventListener("mouseleave", () => {
          cursor.style.background = "var(--primary)";
          follower.style.borderColor = "var(--primary)";
        });
      });

      const closeBtn = document.querySelector(".close-btn");
      if (closeBtn) {
        closeBtn.onclick = () => document.getElementById("modal-chart").close();
      }
    </script>
  </body>
</html>
