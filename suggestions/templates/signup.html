<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>REGISTRO_DE_ACESSO - LuxWatch</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="stylesheet" href="/static/media_query.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
      /* Efeito de Fundo de Partículas Digital */
      body {
        background: radial-gradient(circle at center, #0a0a12 0%, #000 100%);
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .cyber-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background:
          linear-gradient(rgba(0, 168, 255, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 168, 255, 0.05) 1px, transparent 1px);
        background-size: 30px 30px;
        z-index: -1;
        animation: grid-move 20s linear infinite;
      }

      @keyframes grid-move {
        from {
          background-position: 0 0;
        }
        to {
          background-position: 30px 60px;
        }
      }

      .auth-card {
        border: 1px solid var(--accent);
        box-shadow: 0 0 20px rgba(255, 159, 67, 0.2);
        position: relative;
        background: rgba(10, 10, 15, 0.95);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 2px;
        width: 100%;
        max-width: 400px;
        clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%);
      }

      .auth-card h2 {
        color: var(--accent);
        text-shadow: 0 0 10px var(--accent);
        letter-spacing: 5px;
        text-align: center;
        margin-bottom: 30px;
      }

      input {
        background: rgba(255, 255, 255, 0.03) !important;
        border: 1px solid rgba(255, 159, 67, 0.3) !important;
        color: #fff !important;
        padding: 12px !important;
        margin-bottom: 15px !important;
        transition: all 0.3s ease;
      }

      input:focus {
        border-color: var(--accent) !important;
        box-shadow: 0 0 15px rgba(255, 159, 67, 0.4);
        outline: none;
      }

      .btn-register {
        background: transparent;
        border: 1px solid var(--accent);
        color: var(--accent);
        padding: 12px;
        cursor: pointer;
        text-transform: uppercase;
        font-weight: bold;
        position: relative;
        overflow: hidden;
        transition: 0.3s;
      }

      .btn-register:hover {
        background: var(--accent);
        color: #000;
        box-shadow: 0 0 30px var(--accent);
      }

      .system-status {
        font-family: monospace;
        font-size: 0.7rem;
        color: var(--accent);
        margin-bottom: 10px;
        opacity: 0.7;
      }

      @keyframes inputPulse {
        0% {
          box-shadow: 0 0 5px rgba(0, 168, 255, 0.2);
        }
        50% {
          box-shadow: 0 0 15px rgba(0, 168, 255, 0.4);
        }
        100% {
          box-shadow: 0 0 5px rgba(0, 168, 255, 0.2);
        }
      }

      input:focus {
        animation: inputPulse 2s infinite;
      }
    </style>
  </head>
  <body>
    <div class="cyber-bg"></div>

    <div class="auth-card reveal active">
      <div class="scan-line"></div>
      <div class="system-status">SECURE_ENROLLMENT_PROTOCOL_v4.1</div>
      <h2>NEW_IDENTITY</h2>

      <form hx-post="/signup" hx-target="#signup-response">
        <input
          type="text"
          name="username"
          placeholder="CRIE_SEU_USER"
          required
        />
        <input
          type="email"
          name="email"
          placeholder="SEU_EMAIL"
          required
        />
        <input
          type="password"
          name="password"
          placeholder="CRIE_SENHA (MÍN. 6)"
          required
        />

        <button type="submit" class="btn-register" style="width: 100%">
          COMPLETAR_REGISTRO
        </button>

        <div id="signup-response" style="margin-top: 20px"></div>
      </form>

      <p
        style="
          text-align: center;
          margin-top: 20px;
          font-size: 0.8rem;
          color: #888;
        "
      >
        JÁ POSSUI IDENTIDADE?
        <a href="/auth" style="color: var(--primary); text-decoration: none"
          >RETORNAR_AO_LOGIN</a
        >
      </p>
    </div>

    <script>
      // Efeito de glitch aleatório no título
      const h2 = document.querySelector("h2");
      setInterval(() => {
        if (Math.random() > 0.95) {
          h2.style.transform = `translateX(${Math.random() * 4 - 2}px)`;
          setTimeout(() => (h2.style.transform = "none"), 50);
        }
      }, 100);
    </script>
  </body>
</html>
